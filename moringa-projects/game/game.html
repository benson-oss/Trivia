<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <style>
      body{
       font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
      }  
      #choices{
        margin: 20px;
        padding: 20px;
        background-color: blue;
      }
      #choices button{
        background-color: rgb(124, 132, 135);
        font-size: 2rem;
        margin: 0 10px;
        border-radius: 50px;
        cursor: pointer;
      }
        #choices button:hover{
            background-color:rgb(105, 105, 146) ;
        }
    </style>
</head>
<body>
    <h1>ROCK_PAPER_SCISSORS</h1>
    <div id="choices">
        <button onclick="playGame('rock')">👊Rock</button>
         <button onclick="playGame('paper')">✋paper</button>
          <button onclick="playGame('scissors')">✌️Scissor</button>
    </div>
   <div id="playerDisplay">player:</div>
<div id="computerDisplay">computer:</div>
<div id="resultsDisplay">results:</div>

<div class="playerScoreDisplay">playerScore:
    <span id="playerScoreDisplay">0</span>
</div>

<div class="computerScoreDisplay">computerScore:
    <span id="computerScoreDisplay">0</span>
</div>




<script src="index.js"></script>
</body>
</html>
